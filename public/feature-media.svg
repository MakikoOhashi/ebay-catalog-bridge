      </text>
      <rect x="22" y="92" width="104" height="32" rx="10" fill="#ecfeff" />
      <text x="74" y="113" text-anchor="middle" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f766e">
