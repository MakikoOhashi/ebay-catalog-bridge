      </text>
      <rect x="136" y="92" width="104" height="32" rx="10" fill="#ecfeff" />
      <text x="188" y="113" text-anchor="middle" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f766e">
        weight
      </text>
      <rect x="22" y="136" width="218" height="36" rx="12" fill="#f8fafc" stroke="#cbd5e1" />
      <text x="40" y="159" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="15" fill="#334155">
        SKUで商品を追跡
      </text>
    </g>

    <g transform="translate(314 240)">
      <rect x="0" y="0" width="268" height="194" rx="22" fill="#ffffff" />
      <text x="22" y="34" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">
        価格設定
      </text>
      <text x="22" y="68" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="16" fill="#475569">
        Auto Fetch (Frankfurter)
      </text>
      <text x="22" y="100" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="32" font-weight="800" fill="#0f172a">
        1 USD = 159.46 JPY
      </text>
      <rect x="22" y="126" width="96" height="32" rx="10" fill="#eff6ff" />
      <text x="70" y="147" text-anchor="middle" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">
        価格同期 ON
      </text>
    </g>

    <g transform="translate(28 458)">
      <rect x="0" y="0" width="554" height="142" rx="22" fill="#ffffff" />
      <text x="22" y="34" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">
        実行結果
      </text>
      <rect x="22" y="54" width="168" height="58" rx="16" fill="url(#accent)" />
      <text x="44" y="77" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#ccfbf1">
        最新の同期
      </text>
      <text x="44" y="100" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff">
        succeeded
      </text>

      <rect x="214" y="54" width="150" height="58" rx="16" fill="#f8fafc" stroke="#cbd5e1" />
      <text x="236" y="77" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#64748b">
        更新
      </text>
      <text x="236" y="100" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">
        2
      </text>

      <rect x="386" y="54" width="168" height="58" rx="16" fill="#f8fafc" stroke="#cbd5e1" />
      <text x="408" y="77" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#64748b">
        エラー
      </text>
      <text x="408" y="100" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">
        0
      </text>
    </g>

    <g transform="translate(28 624)">
      <rect x="0" y="0" width="554" height="58" rx="18" fill="#0f172a" />
      <text x="32" y="36" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">
